<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ngetich' Password Security Tool</title>
<style>
body{
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:#e5e7eb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#020617;
  padding:25px;
  border-radius:10px;
  width:380px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:6px;
  border:none;
  outline:none;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
  background:#2563eb;
  color:white;
}

button:hover{
  background:#1d4ed8;
}

.status{
  margin-top:10px;
  font-weight:bold;
  text-align:center;
  padding:10px;
  border-radius:6px;
  display:block;
}

.strong{
  background:#052e16;
  color:#bbf7d0;
  border:1px solid #22c55e;
}

.weak{
  background:#7f1d1d;
  color:#fecaca;
  border:1px solid #ef4444;
}

#requirements{
  margin-top:8px;
  font-size:13px;
  color:#fcd34d;
}
</style>
</head>
<body>
<div class="container">
<h1>Rocs space</h1>
<h2>Password Security</h2>

<input type="password" id="password" placeholder="Enter password">
<button type="button" id="togglePassword">Show</button>
<button onclick="generatePassword()">Generate Strong Password</button>

<div id="status" class="status weak">❌ Weak Password</div>
<div id="requirements"></div>
</div>

<script>
const passwordInput = document.getElementById("password");
const statusBox = document.getElementById("status");
const requirementsBox = document.getElementById("requirements");

// Password rules
const MIN_UPPER = 3;  // more than 2
const MIN_NUMBER = 3; // more than 3
const MIN_SYMBOL = 3; // more than 3

function checkPassword(password){
    const upperMatches = password.match(/[A-Z]/g) || [];
    const numberMatches = password.match(/[0-9]/g) || [];
    const symbolMatches = password.match(/[!@#$%^&*(),.?":{}|<>]/g) || [];

    const upperRule = upperMatches.length >= MIN_UPPER;
    const numberRule = numberMatches.length >= MIN_NUMBER;
    const symbolRule = symbolMatches.length >= MIN_SYMBOL;

    // Status
    if(upperRule && numberRule && symbolRule){
        statusBox.textContent = "✅ Strong Password";
        statusBox.className = "status strong";
        requirementsBox.textContent = "";
    } else {
        statusBox.textContent = "❌ Weak Password";
        statusBox.className = "status weak";

        // Show what's missing
        let reqText = "";
        const neededUpper = Math.max(0, MIN_UPPER - upperMatches.length);
        const neededNumber = Math.max(0, MIN_NUMBER - numberMatches.length);
        const neededSymbol = Math.max(0, MIN_SYMBOL - symbolMatches.length);

        if(neededUpper > 0) reqText += `• Add ${neededUpper} more uppercase letter(s)\n`;
        if(neededNumber > 0) reqText += `• Add ${neededNumber} more number(s)\n`;
        if(neededSymbol > 0) reqText += `• Add ${neededSymbol} more symbol(s)\n`;

        requirementsBox.textContent = reqText;
    }
}

// Live validation
passwordInput.addEventListener("input", ()=>{
    checkPassword(passwordInput.value);
});

// Show/hide password
function setupPasswordToggle(inputId, buttonId){
    const input = document.getElementById(inputId);
    const button = document.getElementById(buttonId);
    button.addEventListener("click", ()=>{
        const isHidden = input.type === "password";
        input.type = isHidden ? "text" : "password";
        button.textContent = isHidden ? "Hide" : "Show";
    });
}
setupPasswordToggle("password","togglePassword");

// Generate strong password
function generatePassword(){
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+{}[]<>?";
    let password = "";
    for(let i=0;i<16;i++){
        password += chars.charAt(Math.floor(Math.random()*chars.length));
    }
    passwordInput.value = password;
    checkPassword(password);
}
</script>
</body>
</html>
